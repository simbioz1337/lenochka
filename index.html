<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Для Леночки)</title>
<link rel="icon" type="image/png" href="ava.png">

<style>
body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

#container {
    position: relative;
    width: 500px;
    height: 600px;
}

.text {
    position: absolute;
    color: #ff2a2a;
    font-size: 10px;
    white-space: nowrap;
    animation: flow 1.6s linear infinite;
}

/* 🔴 curgere continua (loop) */
@keyframes flow {
    0%   { transform: translateY(-8px); opacity: 0; }
    20%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(8px); opacity: 0; }
}
</style>
</head>

<body>

<div id="container"></div>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const container = document.getElementById("container");

function heart(t) {
    return {
        x: 16 * Math.pow(Math.sin(t), 3),
        y: 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)
    };
}

// 🔴 putin mai dens, dar lizibil
for (let t = 0; t < Math.PI * 2; t += 0.025) {

    let pos = heart(t);

    let scale = 20;

    let x = pos.x * scale + 250;
    let y = -pos.y * scale + 250;

    let span = document.createElement("span");
    span.className = "text";
    span.innerText = "я тебя люблю";

    span.style.left = x + "px";
    span.style.top = y + "px";

    // delay negativ → deja in miscare (flow continuu)
    let delay = Math.random() * 14;
    span.style.animationDelay = -delay + "s";

    container.appendChild(span);
}

// muzica
document.body.addEventListener("click", () => {
    document.getElementById("music").play();
});
</script>

</body>
</html>
